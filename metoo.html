<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Move — AI Dance Partner</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&family=DM+Serif+Display&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:       #0E0E10;
      --surface:  #17171A;
      --border:   rgba(242,234,217,0.07);
      --text-1:   #F2EAD9;
      --text-2:   rgba(242,234,217,0.45);
      --text-3:   rgba(242,234,217,0.22);
      --accent:   #C8874A;
      --spring:   cubic-bezier(0.16, 1, 0.3, 1);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      background: var(--bg);
      font-family: 'DM Sans', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      overscroll-behavior: none;
      overflow: hidden;
    }

    .screen {
      width: 100vw; height: 100dvh;
      display: flex; flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ─────────────────────────────────────────── */
    .header {
      padding: 52px 28px 20px;
      flex-shrink: 0;
    }
    .eyebrow {
      font-size: 11px; font-weight: 500;
      letter-spacing: 0.14em; text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 10px;
    }
    .headline {
      font-family: 'DM Serif Display', serif;
      font-size: 34px; font-weight: 400;
      color: var(--text-1);
      line-height: 1.12;
      letter-spacing: -0.02em;
    }

    /* ── Song blocks ─────────────────────────────────────── */
    .songs {
      flex: 1;
      display: flex; flex-direction: column;
      gap: 10px;
      padding: 16px 16px 0;
      min-height: 0;
      overflow: hidden;
    }

    .song-block {
      flex: 1;
      position: relative;
      border-radius: 18px;
      border: 1px solid var(--border);
      background: var(--surface);
      overflow: hidden;
      cursor: pointer;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      transition: border-color 0.25s ease, transform 0.25s var(--spring);
      display: flex; flex-direction: column;
      justify-content: flex-end;
      padding: 16px 18px;
      min-height: 0;
    }

    /* genre glow */
    .song-block::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      opacity: 0;
      transition: opacity 0.35s ease;
      pointer-events: none;
    }
    .song-block.afrobeats::after { background: radial-gradient(ellipse at 30% 60%, rgba(200,135,74,0.22) 0%, transparent 70%); }
    .song-block.house::after     { background: radial-gradient(ellipse at 30% 60%, rgba(74,130,200,0.20) 0%, transparent 70%); }
    .song-block.rnb::after       { background: radial-gradient(ellipse at 30% 60%, rgba(180,74,140,0.20) 0%, transparent 70%); }

    .song-block.selected {
      border-color: rgba(200,135,74,0.50);
      transform: scale(1.012);
    }
    .song-block.selected::after { opacity: 1; }

    /* checkmark */
    .song-block .check {
      position: absolute;
      top: 14px; right: 14px;
      width: 22px; height: 22px;
      border-radius: 50%;
      background: var(--accent);
      display: flex; align-items: center; justify-content: center;
      opacity: 0;
      transform: scale(0.6);
      transition: opacity 0.2s ease, transform 0.3s var(--spring);
    }
    .song-block.selected .check { opacity: 1; transform: scale(1); }
    .check svg { width: 11px; height: 11px; }

    /* waveform decoration */
    .waveform {
      position: absolute;
      top: 0; right: 0;
      width: 55%; height: 100%;
      display: flex; align-items: center;
      justify-content: flex-end;
      gap: 2px;
      padding: 10px 14px 10px 0;
      opacity: 0.07;
      pointer-events: none;
    }
    .waveform span {
      width: 2px;
      border-radius: 2px;
      background: var(--text-1);
      flex-shrink: 0;
    }

    /* text content */
    .song-content { position: relative; z-index: 1; }
    .song-genre {
      font-size: 10px; font-weight: 500;
      letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--text-2);
      margin-bottom: 4px;
    }
    .song-title {
      font-family: 'DM Serif Display', serif;
      font-size: 22px; font-weight: 400;
      color: var(--text-1);
      line-height: 1.1;
      letter-spacing: -0.015em;
      margin-bottom: 6px;
    }
    .song-meta {
      font-size: 12px; font-weight: 300;
      color: var(--text-2);
      letter-spacing: 0.01em;
    }

    /* ── Bottom bar ──────────────────────────────────────── */
    .bottom-bar {
      flex-shrink: 0;
      display: flex; align-items: center; gap: 12px;
      padding: 14px 16px 32px;
    }

    .begin-btn {
      flex: 1;
      background: var(--surface);
      color: var(--text-3);
      border: 1px solid rgba(242,234,217,0.05);
      border-radius: 9999px;
      padding: 16px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px; font-weight: 500;
      letter-spacing: 0.01em;
      cursor: default;
      transition: background 0.5s var(--spring), color 0.3s ease,
                  border-color 0.3s ease, box-shadow 0.5s ease;
    }
    .begin-btn.ready {
      background: var(--accent);
      color: #0E0E10;
      border-color: transparent;
      cursor: pointer;
      box-shadow: 0 6px 28px rgba(200,135,74,0.30);
    }
    .begin-btn.ready:active { opacity: 0.75; transform: scale(0.977); }

    .gear-btn {
      width: 50px; height: 50px;
      border-radius: 50%;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text-2);
      font-size: 18px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
      transition: color 0.2s ease, border-color 0.2s ease;
    }
    .gear-btn:active { color: var(--text-1); border-color: rgba(242,234,217,0.18); }

    /* ── Settings sheet ──────────────────────────────────── */
    .settings-sheet {
      position: fixed; inset: 0;
      z-index: 200; pointer-events: none;
    }
    .settings-backdrop {
      position: absolute; inset: 0;
      background: rgba(10,10,12,0.78);
      opacity: 0; transition: opacity 0.3s ease;
    }
    .settings-panel {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      background: #1C1C1F;
      border-top: 1px solid var(--border);
      border-radius: 24px 24px 0 0;
      padding: 20px 24px 48px;
      transform: translateY(100%);
      transition: transform 0.4s var(--spring);
    }
    .settings-sheet.open { pointer-events: auto; }
    .settings-sheet.open .settings-backdrop { opacity: 1; }
    .settings-sheet.open .settings-panel    { transform: translateY(0); }

    .settings-handle {
      width: 36px; height: 3px; border-radius: 2px;
      background: rgba(242,234,217,0.12);
      margin: 0 auto 20px;
    }
    .settings-title {
      font-family: 'DM Serif Display', serif;
      font-size: 20px; color: var(--text-1);
      margin-bottom: 20px;
    }
    .key-field { margin-bottom: 12px; }
    .key-label-row {
      display: flex; justify-content: space-between; align-items: baseline;
      margin-bottom: 6px;
    }
    .key-label {
      font-size: 11px; font-weight: 500;
      letter-spacing: 0.09em; text-transform: uppercase;
      color: var(--text-2);
    }
    .key-tag {
      font-size: 11px; font-weight: 300;
      color: var(--text-3);
    }
    .key-status { font-size: 11px; color: var(--accent); letter-spacing: 0.03em; }
    .key-input {
      width: 100%;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 11px 14px;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px; font-weight: 300;
      color: var(--text-1);
      outline: none;
      -webkit-appearance: none;
    }
    .key-input::placeholder { color: var(--text-3); }
    .key-input:focus { border-color: rgba(200,135,74,0.35); }
    .settings-save {
      width: 100%; margin-top: 10px;
      background: var(--accent); color: #0E0E10;
      border: none; border-radius: 9999px;
      padding: 15px;
      font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 500;
      cursor: pointer;
      transition: opacity 0.15s ease, transform 0.15s ease;
    }
    .settings-save:active { opacity: 0.78; transform: scale(0.977); }
    .settings-clear {
      display: block; width: 100%; margin-top: 8px;
      background: none; border: none;
      font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 300;
      color: var(--text-3); cursor: pointer; padding: 8px; text-align: center;
    }
  </style>
</head>
<body>

<div class="screen">

  <div class="header">
    <div class="eyebrow">AI dance partner</div>
    <div class="headline">move freely.<br>be seen.</div>
  </div>

  <div class="songs" id="songs">

    <div class="song-block afrobeats" data-idx="0">
      <div class="check">
        <svg viewBox="0 0 11 9" fill="none"><polyline points="1,4.5 4,7.5 10,1" stroke="#0E0E10" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <div class="waveform" aria-hidden="true"></div>
      <div class="song-content">
        <div class="song-genre">Afrobeats</div>
        <div class="song-title">Essence</div>
        <div class="song-meta">Wizkid ft. Tems &nbsp;·&nbsp; 109 BPM</div>
      </div>
    </div>

    <div class="song-block house" data-idx="1">
      <div class="check">
        <svg viewBox="0 0 11 9" fill="none"><polyline points="1,4.5 4,7.5 10,1" stroke="#0E0E10" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <div class="waveform" aria-hidden="true"></div>
      <div class="song-content">
        <div class="song-genre">House</div>
        <div class="song-title">Show Me Love</div>
        <div class="song-meta">Robin S. &nbsp;·&nbsp; 129 BPM</div>
      </div>
    </div>

    <div class="song-block rnb" data-idx="2">
      <div class="check">
        <svg viewBox="0 0 11 9" fill="none"><polyline points="1,4.5 4,7.5 10,1" stroke="#0E0E10" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <div class="waveform" aria-hidden="true"></div>
      <div class="song-content">
        <div class="song-genre">R&amp;B</div>
        <div class="song-title">Slow Motion</div>
        <div class="song-meta">Trey Songz &nbsp;·&nbsp; 72 BPM</div>
      </div>
    </div>

  </div>

  <div class="bottom-bar">
    <button class="begin-btn" id="beginBtn">Choose a track</button>
    <button class="gear-btn" id="gearBtn" aria-label="Settings">&#9881;</button>
  </div>

</div>

<!-- Settings sheet -->
<div class="settings-sheet" id="settingsSheet">
  <div class="settings-backdrop" id="settingsBackdrop"></div>
  <div class="settings-panel">
    <div class="settings-handle"></div>
    <div class="settings-title">Settings</div>

    <div class="key-field">
      <div class="key-label-row">
        <span class="key-label">Anthropic</span>
        <span class="key-status" id="anthropicStatus"></span>
      </div>
      <input class="key-input" id="anthropicInput" type="password"
             placeholder="sk-ant-..." autocomplete="off" spellcheck="false">
    </div>

    <div class="key-field">
      <div class="key-label-row">
        <span class="key-label">ElevenLabs</span>
        <span class="key-tag">optional voice</span>
        <span class="key-status" id="elevenStatus"></span>
      </div>
      <input class="key-input" id="elevenInput" type="password"
             placeholder="API key..." autocomplete="off" spellcheck="false">
    </div>

    <div class="key-field">
      <div class="key-label-row">
        <span class="key-label">YouTube playlist</span>
        <span class="key-status" id="ytStatus"></span>
      </div>
      <input class="key-input" id="ytInput" type="url"
             placeholder="youtube.com/playlist?list=…" autocomplete="off" spellcheck="false">
    </div>

    <button class="settings-save" id="settingsSave">Save</button>
    <button class="settings-clear" id="settingsClear">Clear saved keys</button>
  </div>
</div>

<script>
(function () {
  // ── Waveform bars (decorative) ──────────────────────────
  const WAVE_HEIGHTS = [18,28,42,34,50,24,44,30,52,20,38,46,26,40,22,36,48,28,44,32];
  document.querySelectorAll('.waveform').forEach((wf, bi) => {
    WAVE_HEIGHTS.forEach((h, i) => {
      const s = document.createElement('span');
      s.style.height = (h * (0.7 + bi * 0.15)) + 'px';
      wf.appendChild(s);
    });
  });

  // ── Song selection ──────────────────────────────────────
  const blocks   = [...document.querySelectorAll('.song-block')];
  const beginBtn = document.getElementById('beginBtn');
  let chosen = null;

  blocks.forEach(block => {
    block.addEventListener('click', () => {
      blocks.forEach(b => b.classList.remove('selected'));
      block.classList.add('selected');
      chosen = parseInt(block.dataset.idx, 10);
      beginBtn.textContent = 'Begin';
      beginBtn.classList.add('ready');
    });
  });

  beginBtn.addEventListener('click', () => {
    if (chosen === null || !beginBtn.classList.contains('ready')) return;
    beginBtn.disabled = true;
    beginBtn.textContent = 'Starting…';
    setTimeout(() => {
      window.location.href = `session.html?song=${chosen}&persona=0`;
    }, 380);
  });

  // ── Settings ────────────────────────────────────────────
  const settingsSheet   = document.getElementById('settingsSheet');
  const settingsBackdrop = document.getElementById('settingsBackdrop');
  const anthropicInput  = document.getElementById('anthropicInput');
  const elevenInput     = document.getElementById('elevenInput');
  const ytInput         = document.getElementById('ytInput');
  const anthropicStatus = document.getElementById('anthropicStatus');
  const elevenStatus    = document.getElementById('elevenStatus');
  const ytStatus        = document.getElementById('ytStatus');

  function extractPlaylistId(url) {
    try { return new URL(url).searchParams.get('list') || url.trim(); }
    catch (_) { return url.trim(); }
  }

  function openSettings() {
    const ak = localStorage.getItem('ANTHROPIC_KEY')    || '';
    const ek = localStorage.getItem('ELEVENLABS_KEY')   || '';
    const yt = localStorage.getItem('YOUTUBE_PLAYLIST_ID') || '';
    anthropicInput.value = '';
    elevenInput.value    = '';
    ytInput.value        = '';
    anthropicInput.placeholder = ak ? ak.slice(0, 14) + '…' : 'sk-ant-...';
    elevenInput.placeholder    = ek ? ek.slice(0, 10) + '…' : 'API key...';
    ytInput.placeholder        = yt ? yt.slice(0, 22) + '…' : 'youtube.com/playlist?list=…';
    anthropicStatus.textContent = ak ? 'set' : '';
    elevenStatus.textContent    = ek ? 'set' : '';
    ytStatus.textContent        = yt ? 'set' : '';
    settingsSheet.classList.add('open');
  }

  function closeSettings() { settingsSheet.classList.remove('open'); }

  document.getElementById('gearBtn').addEventListener('click', openSettings);
  settingsBackdrop.addEventListener('click', closeSettings);

  document.getElementById('settingsSave').addEventListener('click', () => {
    const ak = anthropicInput.value.trim();
    const ek = elevenInput.value.trim();
    const yt = ytInput.value.trim();
    if (ak) localStorage.setItem('ANTHROPIC_KEY', ak);
    if (ek) localStorage.setItem('ELEVENLABS_KEY', ek);
    if (yt) localStorage.setItem('YOUTUBE_PLAYLIST_ID', extractPlaylistId(yt));
    const btn = document.getElementById('settingsSave');
    btn.textContent = 'Saved';
    setTimeout(() => { btn.textContent = 'Save'; closeSettings(); }, 700);
  });

  document.getElementById('settingsClear').addEventListener('click', () => {
    localStorage.removeItem('ANTHROPIC_KEY');
    localStorage.removeItem('ELEVENLABS_KEY');
    localStorage.removeItem('YOUTUBE_PLAYLIST_ID');
    anthropicStatus.textContent = '';
    elevenStatus.textContent    = '';
    ytStatus.textContent        = '';
    closeSettings();
  });
})();
</script>
</body>
</html>
