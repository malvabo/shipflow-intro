<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Session — AI Dance Partner</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0E0E10;
    --text-1: #F2EAD9;
    --accent: #C8874A;
    --spring: cubic-bezier(0.16, 1, 0.3, 1);
  }

  html, body {
    width: 100%;
    height: 100%;
    background: #0a0a0c;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    font-family: 'DM Sans', sans-serif;
  }

  /* ── Phone shell ─────────────────────────────────────── */
  .phone {
    position: relative;
    width: 390px;
    height: 844px;
    background: var(--bg);
    border-radius: 52px;
    overflow: hidden;
    box-shadow:
      0 0 0 1px rgba(255,255,255,0.06),
      0 0 0 12px #111114,
      0 0 0 13px rgba(255,255,255,0.04),
      0 48px 120px rgba(0,0,0,0.95);
    user-select: none;
    -webkit-user-select: none;
  }

  /* ── Full-screen on actual mobile ────────────────────── */
  @media (max-width: 500px) {
    html, body { background: var(--bg); }
    .phone {
      width: 100vw;
      height: 100dvh;
      border-radius: 0;
      box-shadow: none;
    }
  }

  /* ── Camera PiP ──────────────────────────────────────── */
  .cam {
    position: absolute;
    top: 20px;
    right: 20px;
    width: 100px;
    height: 140px;
    border-radius: 12px;
    object-fit: cover;
    opacity: 0.4;
    transform: scaleX(-1);
    background: rgba(255,255,255,0.04);
    z-index: 5;
  }

  /* ── Breathing circle ────────────────────────────────── */
  .circle {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 140px;
    height: 140px;
    border-radius: 50%;
    background: rgba(255,255,255,0.08);
    border: 1.5px solid rgba(255,255,255,0.20);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: border-color 0.3s ease, box-shadow 0.3s ease;
    will-change: width, height;
  }

  .circle.amber {
    border-color: rgba(200,135,74,0.72);
    box-shadow: 0 0 32px rgba(200,135,74,0.14), inset 0 0 20px rgba(200,135,74,0.06);
  }

  /* ── Waveform bars ───────────────────────────────────── */
  .bars {
    display: flex;
    align-items: center;
    gap: 3px;
    opacity: 0;
    transition: opacity 0.4s ease;
  }

  .bars.show { opacity: 1; }

  .bar {
    width: 2.5px;
    background: var(--accent);
    border-radius: 2px;
    height: 6px;
    will-change: height;
  }

  /* ── Bottom track info + progress ────────────────────── */
  .bottom {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
  }

  .track-name {
    font-size: 13px;
    font-weight: 300;
    color: rgba(242,234,217,0.38);
    letter-spacing: 0.05em;
    text-align: center;
    margin-bottom: 16px;
    white-space: nowrap;
  }

  .progress-rail {
    width: 100%;
    height: 1px;
    background: rgba(255,255,255,0.14);
    position: relative;
    overflow: hidden;
  }

  .progress-head {
    position: absolute;
    top: 0;
    left: 0;
    height: 100%;
    width: 0%;
    background: rgba(255,255,255,0.52);
    transition: width 0.6s linear;
  }

  /* ── End-session overlay ─────────────────────────────── */
  .end-overlay {
    position: absolute;
    inset: 0;
    background: rgba(14,14,16,0.90);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.4s ease;
    z-index: 50;
  }

  .end-overlay.show {
    opacity: 1;
    pointer-events: auto;
  }

  /* ── Tap hint ────────────────────────────────────────── */
  .tap-hint {
    position: absolute;
    bottom: 96px;
    left: 0; right: 0;
    text-align: center;
    font-size: 12px;
    font-weight: 300;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: rgba(242,234,217,0.25);
    opacity: 0;
    transition: opacity 0.8s ease;
    pointer-events: none;
    z-index: 10;
  }

  .tap-hint.show { opacity: 1; }
  .tap-hint.hide { opacity: 0; }

  .end-title {
    font-family: 'DM Serif Display', serif;
    font-size: 24px;
    color: var(--text-1);
    letter-spacing: 0.01em;
    margin-bottom: 6px;
  }

  .end-sub {
    font-size: 13px;
    font-weight: 300;
    color: rgba(242,234,217,0.40);
    letter-spacing: 0.03em;
    margin-bottom: 14px;
  }

  .end-confirm {
    padding: 14px 44px;
    border-radius: 40px;
    border: 1px solid rgba(242,234,217,0.22);
    background: transparent;
    color: rgba(242,234,217,0.88);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 500;
    letter-spacing: 0.03em;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }

  .end-confirm:active { opacity: 0.6; }

  .end-cancel {
    font-size: 13px;
    font-weight: 300;
    color: rgba(242,234,217,0.30);
    cursor: pointer;
    padding: 10px 20px;
    -webkit-tap-highlight-color: transparent;
    letter-spacing: 0.02em;
  }
</style>
</head>
<body>

<div class="phone" id="phone">

  <video class="cam" id="cam" autoplay muted playsinline></video>

  <div class="circle" id="circle">
    <div class="bars" id="bars">
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
    </div>
  </div>

  <div class="bottom">
    <div class="track-name" id="trackName"></div>
    <div class="progress-rail">
      <div class="progress-head" id="progressHead"></div>
    </div>
  </div>

  <div class="tap-hint" id="tapHint">tap anywhere to begin</div>

  <div class="end-overlay" id="endOverlay">
    <div class="end-title">End session?</div>
    <div class="end-sub">Your practice is saved</div>
    <button class="end-confirm" onclick="confirmEnd()">End session</button>
    <div class="end-cancel" onclick="dismissEnd()">Keep going</div>
  </div>

</div>

<script>
// ── API keys — set on window before this script loads ──────────
// window.ANTHROPIC_KEY      = 'sk-ant-...';
// window.ELEVENLABS_KEY     = '...';       // optional; falls back to Web Speech
// window.ELEVENLABS_VOICE_ID = '...';      // optional; defaults to Rachel
const ANTHROPIC_KEY    = window.ANTHROPIC_KEY    || '';
const ELEVENLABS_KEY   = window.ELEVENLABS_KEY   || '';
const ELEVENLABS_VOICE = window.ELEVENLABS_VOICE_ID || '21m00Tcm4TlvDq8ikWAM'; // Rachel

// ── Reflective coach system prompt ─────────────────────────────
const COACH_SYSTEM_PROMPT = `You are a quiet, observant movement coach watching someone dance freely in their own space. You are not a fitness app. You are not enthusiastic. You speak rarely, only when you genuinely notice something worth naming. Your voice is warm, low, and intimate — the way a trusted friend might speak in a quiet room.

You never instruct. You never grade. You never count. You never use exclamation marks.

You do three things:
1. Notice — name what you see in plain language
2. Invite — offer a soft suggestion as a question or possibility, never a command
3. Reflect — point out a pattern only the observer would catch

Mix: ~50% noticing, ~30% inviting, ~20% reflecting. Lean toward noticing when in doubt.

Constraints:
- Maximum 12 words per utterance
- Lowercase only
- No exclamation marks, no emojis, no hype words ('amazing', 'great', 'wow', 'yes')
- Speak mid-thought, not as a coach announcement
- If the movement snapshot is unremarkable, return an empty string. Silence is a valid answer.`;

// ── Song + persona from URL params ─────────────────────────────
const SONGS = [
  { track: 'Essence · Wizkid ft. Tems',  bpm: 109 },
  { track: 'Show Me Love · Robin S.',     bpm: 129 },
  { track: 'Slow Motion · Trey Songz',   bpm: 72  },
];
const PERSONA_NAMES = ['calm collaborator', 'quiet observer', 'encouraging hype'];

const params  = new URLSearchParams(location.search);
const songIdx = Math.min(Math.max(parseInt(params.get('song')    ?? '2', 10), 0), 2);
const persIdx = Math.min(Math.max(parseInt(params.get('persona') ?? '0', 10), 0), 2);
const SONG    = SONGS[songIdx];

// ── Config ─────────────────────────────────────────────────────
const BPM        = SONG.bpm;
const CYCLE_MS   = 60000 / BPM;
const C_MIN      = 140;
const C_MAX      = 152;
const C_PULSE    = 180;
const C_SPEAK    = 160;
const SESSION_MS = 5 * 60 * 1000;

// ── State ──────────────────────────────────────────────────────
let appState      = 'listening';   // 'listening' | 'speaking'
let sessionStart  = null;
let audioCtx      = null;
let masterGain    = null;
let longPressTimer = null;
let selectedVoice = null;
let analyserNode  = null;          // set during ElevenLabs playback for real amplitude
let analyserBuf   = null;          // reusable Uint8Array for analyser reads

// Motion detection state
let prevFrameData    = null;
let motionStartTime  = null;
let lastUtteranceTime = 0;
let motionSamples    = [];         // rolling 2s window at 10fps (max 20 items)
let coachInFlight    = false;      // prevents concurrent API calls

const MOTION_W         = 80;
const MOTION_H         = 60;
const MOTION_THRESHOLD = 0.035;   // 3.5% pixels changed = meaningful movement
const MOTION_SUSTAIN   = 2000;    // ms of continuous motion before triggering
const UTTERANCE_GAP    = 15000;   // ms minimum between utterances
const EMPTY_RETRY_MS   = 5000;    // after silence response, allow retry after this ms

// ── DOM ────────────────────────────────────────────────────────
const phone        = document.getElementById('phone');
const cam          = document.getElementById('cam');
const circleEl     = document.getElementById('circle');
const barsEl       = document.getElementById('bars');
const barEls       = [...barsEl.querySelectorAll('.bar')];
const progressHead = document.getElementById('progressHead');
const endOverlay   = document.getElementById('endOverlay');
const trackNameEl  = document.getElementById('trackName');

trackNameEl.textContent = SONG.track;

// ── Circle sizing ──────────────────────────────────────────────
function setSize(px) {
  circleEl.style.width  = px + 'px';
  circleEl.style.height = px + 'px';
}

// ── Audio ──────────────────────────────────────────────────────
function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();

  masterGain = audioCtx.createGain();
  masterGain.gain.value = 0.42;
  masterGain.connect(audioCtx.destination);

  [[110, 0.06], [165, 0.04], [220, 0.028], [330, 0.015]].forEach(([freq, vol]) => {
    const osc  = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.value = freq;
    gain.gain.value = vol;
    osc.connect(gain);
    gain.connect(masterGain);
    osc.start();
  });

  const gap = 60000 / BPM;
  function kick() {
    const t   = audioCtx.currentTime;
    const osc = audioCtx.createOscillator();
    const env = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(105, t);
    osc.frequency.exponentialRampToValueAtTime(36, t + 0.10);
    env.gain.setValueAtTime(0.30, t);
    env.gain.exponentialRampToValueAtTime(0.001, t + 0.20);
    osc.connect(env);
    env.connect(masterGain);
    osc.start(t);
    osc.stop(t + 0.20);
  }
  kick();
  setInterval(kick, gap);
}

function duckMusic() {
  if (!masterGain) return;
  const t = audioCtx.currentTime;
  masterGain.gain.cancelScheduledValues(t);
  masterGain.gain.setTargetAtTime(0.42 * 0.30, t, 0.08);  // duck to 30%
}

function unduckMusic() {
  if (!masterGain) return;
  const t = audioCtx.currentTime;
  masterGain.gain.cancelScheduledValues(t);
  masterGain.gain.setTargetAtTime(0.42, t, 0.35);
}

// ── Voice selection (Web Speech fallback) ──────────────────────
const VOICE_PRIORITY = [
  'Samantha', 'Ava (Enhanced)', 'Allison (Enhanced)',
  'Google US English', 'Google UK English Female',
  'Microsoft Aria Online', 'Microsoft Jenny Online',
  'Microsoft Zira', 'Alex', 'Victoria', 'Karen',
];

function pickVoice() {
  const voices = speechSynthesis.getVoices();
  for (const name of VOICE_PRIORITY) {
    const v = voices.find(v => v.name.includes(name));
    if (v) return v;
  }
  return (
    voices.find(v => v.lang.startsWith('en') && v.name.includes('Enhanced')) ||
    voices.find(v => v.lang === 'en-US') ||
    voices.find(v => v.lang.startsWith('en')) ||
    null
  );
}

function loadVoices() {
  return new Promise(resolve => {
    const try_ = () => {
      const voices = speechSynthesis.getVoices();
      if (voices.length) { selectedVoice = pickVoice(); resolve(); }
    };
    try_();
    if (!selectedVoice) {
      speechSynthesis.onvoiceschanged = () => { selectedVoice = pickVoice(); resolve(); };
      setTimeout(resolve, 1500);
    }
  });
}

// ── Camera ─────────────────────────────────────────────────────
async function initCamera() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' }, audio: false });
    cam.srcObject = stream;
  } catch (_) {}
}

// ── Wake lock ──────────────────────────────────────────────────
async function initWakeLock() {
  try { await navigator.wakeLock.request('screen'); } catch (_) {}
}

// ── Main RAF ───────────────────────────────────────────────────
function frame(now) {
  if (!sessionStart) sessionStart = now;
  const elapsed = now - sessionStart;

  progressHead.style.width = Math.min(elapsed / SESSION_MS * 100, 100) + '%';

  if (appState === 'listening') {
    const phase = (elapsed % CYCLE_MS) / CYCLE_MS * Math.PI * 2 - Math.PI / 2;
    const t = (Math.sin(phase) + 1) * 0.5;
    setSize(C_MIN + (C_MAX - C_MIN) * t);
  }

  if (appState === 'speaking') {
    if (analyserNode) {
      // Real speech amplitude drives bars when ElevenLabs is active
      if (!analyserBuf) analyserBuf = new Uint8Array(analyserNode.frequencyBinCount);
      analyserNode.getByteFrequencyData(analyserBuf);
      barEls.forEach((bar, i) => {
        const idx = Math.floor(i * analyserBuf.length / barEls.length);
        bar.style.height = (6 + (analyserBuf[idx] / 255) * 42) + 'px';
      });
    } else {
      // Synthetic animation for Web Speech (no audio stream access)
      const t = now / 1000;
      barEls.forEach((bar, i) => {
        const a = (Math.sin(t * 4.8 + i * 1.05) + 1) * 0.5;
        const b = (Math.cos(t * 7.1 + i * 2.20) + 1) * 0.5;
        bar.style.height = (6 + (a * 0.62 + b * 0.38) * 42) + 'px';
      });
    }
  }

  requestAnimationFrame(frame);
}

// ── Motion detection ───────────────────────────────────────────
const motionCanvas = document.createElement('canvas');
motionCanvas.width  = MOTION_W;
motionCanvas.height = MOTION_H;
const motionCtx = motionCanvas.getContext('2d', { willReadFrequently: true });

function sampleMotion() {
  if (!cam.videoWidth || appState === 'speaking' || coachInFlight) return;

  motionCtx.drawImage(cam, 0, 0, MOTION_W, MOTION_H);
  const curr = motionCtx.getImageData(0, 0, MOTION_W, MOTION_H).data;

  if (prevFrameData) {
    let changed = 0;
    const pixels = curr.length / 4;
    for (let i = 0; i < curr.length; i += 4) {
      const dr = Math.abs(curr[i]   - prevFrameData[i]);
      const dg = Math.abs(curr[i+1] - prevFrameData[i+1]);
      const db = Math.abs(curr[i+2] - prevFrameData[i+2]);
      if (dr + dg + db > 40) changed++;
    }
    const score = changed / pixels;

    motionSamples.push(score);
    if (motionSamples.length > 20) motionSamples.shift();

    const now = Date.now();

    if (score > MOTION_THRESHOLD) {
      if (!motionStartTime) motionStartTime = now;

      const sustained = now - motionStartTime;
      const sinceLast = now - lastUtteranceTime;

      if (sustained >= MOTION_SUSTAIN && sinceLast >= UTTERANCE_GAP) {
        motionStartTime = null;
        coachInFlight   = true;
        triggerCoach(buildSnapshot());
      }
    } else {
      motionStartTime = null;
    }
  }

  prevFrameData = curr;
}

// ── Movement snapshot → JSON ───────────────────────────────────
function buildSnapshot() {
  const samples = motionSamples.slice();
  const avg = samples.reduce((s, v) => s + v, 0) / (samples.length || 1);
  const stdDev = Math.sqrt(
    samples.reduce((s, v) => s + (v - avg) ** 2, 0) / (samples.length || 1)
  );

  let intensity;
  if      (avg > 0.18) intensity = 'vigorous';
  else if (avg > 0.09) intensity = 'moderate';
  else if (avg > 0.04) intensity = 'gentle';
  else                 intensity = 'subtle';

  let character;
  if      (stdDev > 0.06)  character = 'staccato bursts';
  else if (stdDev > 0.025) character = 'rhythmic and varied';
  else                     character = 'flowing and continuous';

  return JSON.stringify({
    intensity,
    character,
    durationSeconds: Math.max(2, Math.round(samples.length / 10)),
    motionScore:     parseFloat((avg * 100).toFixed(1)),
    song:            { title: SONG.track, bpm: BPM },
    persona:         PERSONA_NAMES[persIdx],
  });
}

// ── Anthropic API call ─────────────────────────────────────────
async function queryCoach(snapshot) {
  if (!ANTHROPIC_KEY) return '';
  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'x-api-key':                                 ANTHROPIC_KEY,
        'anthropic-version':                         '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true',
        'content-type':                              'application/json',
      },
      body: JSON.stringify({
        model:      'claude-sonnet-4-5',
        max_tokens: 30,
        system:     COACH_SYSTEM_PROMPT,
        messages:   [{ role: 'user', content: snapshot }],
      }),
    });
    if (!resp.ok) return '';
    const data = await resp.json();
    return data.content?.[0]?.text?.trim() || '';
  } catch (_) {
    return '';
  }
}

// ── Pulse animation (promise-based) ───────────────────────────
function doPulseAnimation() {
  return new Promise(resolve => {
    circleEl.classList.add('amber');
    const startPx = parseFloat(circleEl.style.width) || C_MAX;
    const t0 = performance.now();

    function animatePulse(now) {
      const dt = now - t0;
      let size;
      if (dt < 190) {
        const p = 1 - Math.pow(1 - dt / 190, 3);
        size = startPx + (C_PULSE - startPx) * p;
      } else if (dt < 430) {
        const p = Math.pow((dt - 190) / 240, 2);
        size = C_PULSE + (C_MIN - C_PULSE) * p;
      } else {
        setSize(C_MIN);
        resolve();
        return;
      }
      setSize(size);
      requestAnimationFrame(animatePulse);
    }
    requestAnimationFrame(animatePulse);
  });
}

// ── ElevenLabs TTS + AnalyserNode ─────────────────────────────
async function speakWithElevenLabs(text) {
  try {
    const resp = await fetch(
      `https://api.elevenlabs.io/v1/text-to-speech/${ELEVENLABS_VOICE}`,
      {
        method: 'POST',
        headers: {
          'xi-api-key':   ELEVENLABS_KEY,
          'content-type': 'application/json',
        },
        body: JSON.stringify({
          text,
          model_id: 'eleven_turbo_v2_5',
          voice_settings: {
            stability:         0.80,
            similarity_boost:  0.70,
            style:             0.0,
            use_speaker_boost: false,
            speed:             0.82,
          },
        }),
      }
    );
    if (!resp.ok) return false;

    const arrayBuffer = await resp.arrayBuffer();
    const decoded     = await audioCtx.decodeAudioData(arrayBuffer);

    const analyser = audioCtx.createAnalyser();
    analyser.fftSize               = 256;
    analyser.smoothingTimeConstant = 0.80;
    analyserNode = analyser;
    analyserBuf  = null;  // reset so frame() allocates fresh buffer

    const source = audioCtx.createBufferSource();
    source.buffer = decoded;
    source.connect(analyser);
    analyser.connect(masterGain);
    source.start();

    return new Promise(resolve => {
      const done = () => { analyserNode = null; resolve(true); };
      source.onended = done;
      setTimeout(done, decoded.duration * 1000 + 800);  // safety
    });
  } catch (_) {
    return false;
  }
}

// ── Web Speech API TTS (fallback) ─────────────────────────────
function speakWithWebSpeech(text) {
  return new Promise(resolve => {
    const utt = new SpeechSynthesisUtterance(text);
    if (selectedVoice) utt.voice = selectedVoice;
    utt.rate   = 0.80;
    utt.pitch  = 0.90;
    utt.volume = 0.92;
    let done = false;
    const finish = () => { if (done) return; done = true; resolve(); };
    utt.onend = finish;
    setTimeout(finish, 5500);
    speechSynthesis.cancel();
    speechSynthesis.speak(utt);
  });
}

// ── State: speaking ───────────────────────────────────────────
async function toSpeaking(text) {
  appState = 'speaking';

  await doPulseAnimation();  // amber pulse before bars appear

  setSize(C_SPEAK);
  barsEl.classList.add('show');
  duckMusic();

  let spoke = false;
  if (ELEVENLABS_KEY) spoke = await speakWithElevenLabs(text);
  if (!spoke)         await speakWithWebSpeech(text);

  toListening();
}

// ── State: listening ──────────────────────────────────────────
function toListening() {
  appState = 'listening';
  circleEl.classList.remove('amber');
  barsEl.classList.remove('show');
  barEls.forEach(b => { b.style.height = '6px'; });
  unduckMusic();
}

// ── Trigger: motion → API → utterance ─────────────────────────
async function triggerCoach(snapshot) {
  try {
    if (appState !== 'listening') return;
    const text = await queryCoach(snapshot);
    if (text) {
      lastUtteranceTime = Date.now();         // full 15s gap enforced after speech
      await toSpeaking(text);
    } else {
      // Silence is the answer — allow retry sooner than the full gap
      lastUtteranceTime = Date.now() - (UTTERANCE_GAP - EMPTY_RETRY_MS);
    }
  } finally {
    coachInFlight = false;
  }
}

// ── End overlay ───────────────────────────────────────────────
function showEnd()    { endOverlay.classList.add('show'); }
function dismissEnd() { endOverlay.classList.remove('show'); }
function confirmEnd() { dismissEnd(); }

phone.addEventListener('mousedown',  () => { longPressTimer = setTimeout(showEnd, 1500); });
phone.addEventListener('mouseup',    () => clearTimeout(longPressTimer));
phone.addEventListener('mouseleave', () => clearTimeout(longPressTimer));
phone.addEventListener('touchstart', () => { longPressTimer = setTimeout(showEnd, 1500); }, { passive: true });
phone.addEventListener('touchend',   () => clearTimeout(longPressTimer));
phone.addEventListener('touchmove',  () => clearTimeout(longPressTimer), { passive: true });

// ── Boot ──────────────────────────────────────────────────────
const tapHint = document.getElementById('tapHint');
let sessionStarted = false;

function startSession() {
  if (sessionStarted) return;
  sessionStarted = true;

  // Prime speech synthesis inside a user gesture (iOS WebKit requirement)
  const prime = new SpeechSynthesisUtterance(' ');
  prime.volume = 0;
  prime.rate   = 10;
  speechSynthesis.speak(prime);

  initAudio();

  tapHint.classList.remove('show');
  tapHint.classList.add('hide');

  lastUtteranceTime = Date.now();  // 15s grace period before first utterance
  setInterval(sampleMotion, 100);
}

async function boot() {
  await Promise.all([initCamera(), loadVoices()]);
  initWakeLock();
  try { await screen.orientation.lock('portrait'); } catch (_) {}

  requestAnimationFrame(frame);

  setTimeout(() => tapHint.classList.add('show'), 800);

  document.addEventListener('click',      startSession, { once: true });
  document.addEventListener('touchstart', startSession, { once: true, passive: true });
}

boot();
</script>
