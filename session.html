<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Session — AI Dance Partner</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0E0E10;
    --text-1: #F2EAD9;
    --accent: #C8874A;  /* amber — voice only */
    --track: #5A9E70;   /* green — tracking only */
  }

  html, body {
    width: 100%;
    height: 100%;
    background: #0a0a0c;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    font-family: 'DM Sans', sans-serif;
  }

  /* ── Phone shell ─────────────────────────────────────── */
  .phone {
    position: relative;
    width: 390px;
    height: 844px;
    background: var(--bg);
    border-radius: 52px;
    overflow: hidden;
    box-shadow:
      0 0 0 1px rgba(255,255,255,0.06),
      0 0 0 12px #111114,
      0 0 0 13px rgba(255,255,255,0.04),
      0 48px 120px rgba(0,0,0,0.95);
    user-select: none;
    -webkit-user-select: none;
    transition: background 1.4s ease;
  }

  .phone.ended { background: #36363A; }

  @media (max-width: 500px) {
    html, body { background: var(--bg); }
    .phone {
      width: 100vw;
      height: 100dvh;
      border-radius: 0;
      box-shadow: none;
    }
  }

  /* ── Camera PiP ──────────────────────────────────────── */
  .cam {
    position: absolute;
    top: 20px;
    right: 20px;
    width: 100px;
    height: 140px;
    border-radius: 12px;
    object-fit: cover;
    opacity: 0.4;
    transform: scaleX(-1);
    background: rgba(255,255,255,0.04);
    z-index: 5;
  }

  /* ── Green tracking dot ──────────────────────────────── */
  .track-dot {
    position: absolute;
    width: 9px;
    height: 9px;
    border-radius: 50%;
    background: var(--track);
    box-shadow: 0 0 10px rgba(90,158,112,0.55);
    pointer-events: none;
    z-index: 8;
    transform: translate(-50%, -50%);
    opacity: 0;
    transition: left 0.12s ease, top 0.12s ease, opacity 0.4s ease;
  }

  .track-dot.active { opacity: 1; }

  /* ── Breathing circle ────────────────────────────────── */
  .circle {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 140px;
    height: 140px;
    border-radius: 50%;
    background: rgba(255,255,255,0.08);
    border: 1.5px solid rgba(255,255,255,0.20);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: border-color 0.3s ease, box-shadow 0.3s ease;
    will-change: width, height;
  }

  .circle.amber {
    border-color: rgba(200,135,74,0.72);
    box-shadow: 0 0 32px rgba(200,135,74,0.14), inset 0 0 20px rgba(200,135,74,0.06);
  }

  /* ── Waveform bars ───────────────────────────────────── */
  .bars {
    display: flex;
    align-items: center;
    gap: 3px;
    opacity: 0;
    transition: opacity 0.4s ease;
  }

  .bars.show { opacity: 1; }

  .bar {
    width: 2.5px;
    background: var(--accent);
    border-radius: 2px;
    height: 6px;
    will-change: height;
  }

  /* ── Track label + progress ──────────────────────────── */
  .bottom {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
  }

  .track-name {
    font-size: 13px;
    font-weight: 300;
    color: rgba(242,234,217,0.38);
    letter-spacing: 0.05em;
    text-align: center;
    margin-bottom: 16px;
    white-space: nowrap;
  }

  .progress-rail {
    width: 100%;
    height: 1px;
    background: rgba(255,255,255,0.14);
    position: relative;
    overflow: hidden;
  }

  .progress-head {
    position: absolute;
    top: 0; left: 0;
    height: 100%;
    width: 0%;
    background: rgba(255,255,255,0.52);
    transition: width 0.6s linear;
  }

  /* ── End overlay — one option ────────────────────────── */
  .end-overlay {
    position: absolute;
    inset: 0;
    background: rgba(14,14,16,0.90);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.4s ease;
    z-index: 50;
  }

  .end-overlay.show { opacity: 1; pointer-events: auto; }

  .end-confirm {
    padding: 14px 44px;
    border-radius: 40px;
    border: 1px solid rgba(242,234,217,0.22);
    background: transparent;
    color: rgba(242,234,217,0.88);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 500;
    letter-spacing: 0.03em;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }

  .end-confirm:active { opacity: 0.6; }

  /* ── Tap hint ────────────────────────────────────────── */
  .tap-hint {
    position: absolute;
    bottom: 96px;
    left: 0; right: 0;
    text-align: center;
    font-size: 12px;
    font-weight: 300;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: rgba(242,234,217,0.25);
    opacity: 0;
    transition: opacity 0.8s ease;
    pointer-events: none;
    z-index: 10;
  }

  .tap-hint.show { opacity: 1; }
</style>
</head>
<body>

<!-- hidden canvas for motion diff -->
<canvas id="motionCanvas" width="80" height="120" style="display:none"></canvas>

<div class="phone" id="phone">

  <video class="cam" id="cam" autoplay muted playsinline></video>

  <div class="track-dot" id="trackDot"></div>

  <div class="circle" id="circle">
    <div class="bars" id="bars">
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
    </div>
  </div>

  <div class="bottom">
    <div class="track-name" id="trackName"></div>
    <div class="progress-rail">
      <div class="progress-head" id="progressHead"></div>
    </div>
  </div>

  <div class="tap-hint" id="tapHint">tap anywhere to begin</div>

  <div class="end-overlay" id="endOverlay">
    <button class="end-confirm" id="endBtn">End session</button>
  </div>

</div>

<script>
// ─── Songs & persona lines ─────────────────────────────────────
const SONGS = [
  { track: 'Essence · Wizkid ft. Tems', bpm: 109 },
  { track: 'Show Me Love · Robin S.',   bpm: 129 },
  { track: 'Slow Motion · Trey Songz',  bpm: 72  },
];
const PERSONA_LINES = [
  [
    "Your weight is landing right on the downbeat.",
    "Let the pause before the drop build the tension.",
    "Your body already knows this chorus — let it lead.",
    "Feel the space between the notes. That's yours.",
  ],
  [
    "Notice that.",
    "Your hips are ahead of the beat now.",
    "There.",
    "The transition — you felt it before it came.",
  ],
  [
    "Yes — that landing was clean.",
    "You're locking in. Keep going.",
    "That pattern you just did? Do it again.",
    "You're in it. Don't think now.",
  ],
];

const params  = new URLSearchParams(location.search);
const songIdx = Math.min(Math.max(parseInt(params.get('song')    ?? '2', 10), 0), 2);
const persIdx = Math.min(Math.max(parseInt(params.get('persona') ?? '0', 10), 0), 2);
const SONG    = SONGS[songIdx];
const LINES   = PERSONA_LINES[persIdx];

// ─── Config ────────────────────────────────────────────────────
const BPM        = SONG.bpm;
const CYCLE_MS   = 60000 / BPM;
const C_MIN      = 140;
const C_MAX      = 152;
const C_PULSE    = 180;
const C_SPEAK    = 160;
const SESSION_MS = 5 * 60 * 1000;
const GAP_MS     = 15000;   // min ms between utterances
const LOOP_MS    = 60000;   // demo music loop cue at 60s
const SILENCE_ON = 2;       // force empty return on Nth trigger (1-based)

// Motion detection constants
const M_W = 80, M_H = 120;
const M_THRESH     = 28;
const M_MIN_PIX    = 25;

// ─── State ─────────────────────────────────────────────────────
let appState      = 'listening'; // 'listening' | 'pulse' | 'speaking' | 'ended'
let sessionStart  = null;        // set by first RAF tick
let audioCtx      = null;
let masterGain    = null;
let selectedVoice = null;
let sessionActive = false;       // true after first tap
let lastSpeakTime = 0;
let triggerCount  = 0;
let prevFrameData = null;
let dotTimeout    = null;
let musicLooped   = false;
let wakeLock      = null;
let rafActive     = true;
let longPressTimer = null;

// ─── DOM ───────────────────────────────────────────────────────
const phone        = document.getElementById('phone');
const cam          = document.getElementById('cam');
const circleEl     = document.getElementById('circle');
const barsEl       = document.getElementById('bars');
const barEls       = [...barsEl.querySelectorAll('.bar')];
const progressHead = document.getElementById('progressHead');
const endOverlay   = document.getElementById('endOverlay');
const trackNameEl  = document.getElementById('trackName');
const trackDot     = document.getElementById('trackDot');
const tapHint      = document.getElementById('tapHint');
const motionCanvas = document.getElementById('motionCanvas');
const mCtx         = motionCanvas.getContext('2d');

trackNameEl.textContent = SONG.track;

// ─── Circle sizing ─────────────────────────────────────────────
function setSize(px) {
  circleEl.style.width  = px + 'px';
  circleEl.style.height = px + 'px';
}

// ─── Audio ─────────────────────────────────────────────────────
function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();

  masterGain = audioCtx.createGain();
  masterGain.gain.value = 0;
  masterGain.connect(audioCtx.destination);

  // Fade in from silence
  masterGain.gain.setTargetAtTime(0.42, audioCtx.currentTime, 0.6);

  // Ambient pad — four sine partials
  [[110, 0.06], [165, 0.04], [220, 0.028], [330, 0.015]].forEach(([freq, vol]) => {
    const osc  = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.value = freq;
    gain.gain.value = vol;
    osc.connect(gain);
    gain.connect(masterGain);
    osc.start();
  });

  // Kick drum at song BPM
  const beatMs = 60000 / BPM;
  function kick() {
    if (!audioCtx) return;
    const now = audioCtx.currentTime;
    const osc  = audioCtx.createOscillator();
    const env  = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(105, now);
    osc.frequency.exponentialRampToValueAtTime(36, now + 0.10);
    env.gain.setValueAtTime(0.30, now);
    env.gain.exponentialRampToValueAtTime(0.001, now + 0.20);
    osc.connect(env);
    env.connect(masterGain);
    osc.start(now);
    osc.stop(now + 0.20);
  }
  kick();
  setInterval(kick, beatMs);
}

function duckMusic() {
  if (!masterGain) return;
  const now = audioCtx.currentTime;
  masterGain.gain.cancelScheduledValues(now);
  masterGain.gain.setTargetAtTime(0.42 * 0.65, now, 0.08);
}

function unduckMusic() {
  if (!masterGain) return;
  const now = audioCtx.currentTime;
  masterGain.gain.cancelScheduledValues(now);
  masterGain.gain.setTargetAtTime(0.42, now, 0.35);
}

// Subtle volume dip at the 60s loop point — signals the demo loop restart
function loopMusicCue() {
  if (!masterGain || musicLooped) return;
  musicLooped = true;
  const now = audioCtx.currentTime;
  masterGain.gain.cancelScheduledValues(now);
  masterGain.gain.setTargetAtTime(0.05, now, 0.12);
  masterGain.gain.setTargetAtTime(0.42, now + 0.65, 0.22);
}

// ─── Voice selection ───────────────────────────────────────────
const VOICE_PRIORITY = [
  'Samantha', 'Ava (Enhanced)', 'Allison (Enhanced)',
  'Google US English', 'Google UK English Female',
  'Microsoft Aria Online', 'Microsoft Jenny Online',
  'Microsoft Zira', 'Alex', 'Victoria', 'Karen',
];

function pickVoice() {
  const voices = speechSynthesis.getVoices();
  for (const name of VOICE_PRIORITY) {
    const match = voices.find(v => v.name.includes(name));
    if (match) return match;
  }
  return voices.find(v => v.lang.startsWith('en') && v.name.includes('Enhanced'))
      || voices.find(v => v.lang === 'en-US')
      || voices.find(v => v.lang.startsWith('en'))
      || null;
}

function loadVoices() {
  return new Promise(resolve => {
    const try_ = () => {
      const voices = speechSynthesis.getVoices();
      if (voices.length) { selectedVoice = pickVoice(); resolve(); }
    };
    try_();
    if (!selectedVoice) {
      speechSynthesis.onvoiceschanged = () => { selectedVoice = pickVoice(); resolve(); };
      setTimeout(resolve, 1500);
    }
  });
}

// ─── Camera ────────────────────────────────────────────────────
async function initCamera() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' }, audio: false });
    cam.srcObject = stream;
  } catch (_) {}
}

// ─── Wake lock ─────────────────────────────────────────────────
async function initWakeLock() {
  try { wakeLock = await navigator.wakeLock.request('screen'); } catch (_) {}
}

// ─── Motion detection ──────────────────────────────────────────
function detectMotion() {
  if (!cam.srcObject || cam.videoWidth === 0) return;

  mCtx.drawImage(cam, 0, 0, M_W, M_H);
  const { data } = mCtx.getImageData(0, 0, M_W, M_H);

  if (!prevFrameData) { prevFrameData = data.slice(); return; }

  let sumX = 0, sumY = 0, count = 0;

  for (let y = 0; y < M_H; y++) {
    for (let x = 0; x < M_W; x++) {
      const i = (y * M_W + x) * 4;
      const diff = Math.abs(data[i]   - prevFrameData[i])
                 + Math.abs(data[i+1] - prevFrameData[i+1])
                 + Math.abs(data[i+2] - prevFrameData[i+2]);
      if (diff > M_THRESH) { sumX += x; sumY += y; count++; }
    }
  }

  prevFrameData = data.slice();

  if (count < M_MIN_PIX) return;

  // Map centroid to phone coords — mirror x to match the flipped video
  const cx = (1 - sumX / count / M_W) * 350 + 20;
  const cy = (sumY / count / M_H) * 760 + 42;

  trackDot.style.left = cx + 'px';
  trackDot.style.top  = cy + 'px';
  trackDot.classList.add('active');

  // Hide dot briefly after motion stops
  clearTimeout(dotTimeout);
  dotTimeout = setTimeout(() => trackDot.classList.remove('active'), 900);

  // Trigger utterance: session must be active, state must be listening, gap respected
  const now = Date.now();
  if (sessionActive && appState === 'listening' && (now - lastSpeakTime) >= GAP_MS) {
    lastSpeakTime = now;
    firePulse();
  }
}

// ─── Main RAF loop ─────────────────────────────────────────────
function frame(now) {
  if (!rafActive) return;
  if (!sessionStart) sessionStart = now;
  const elapsed = now - sessionStart;

  progressHead.style.width = Math.min(elapsed / SESSION_MS * 100, 100) + '%';

  if (appState === 'listening') {
    const phase = (elapsed % CYCLE_MS) / CYCLE_MS * Math.PI * 2 - Math.PI / 2;
    setSize(C_MIN + (C_MAX - C_MIN) * (Math.sin(phase) + 1) * 0.5);
  }

  if (appState === 'speaking') {
    const t = now / 1000;
    barEls.forEach((bar, i) => {
      const a = (Math.sin(t * 4.8 + i * 1.05) + 1) * 0.5;
      const b = (Math.cos(t * 7.1 + i * 2.20) + 1) * 0.5;
      bar.style.height = (6 + (a * 0.62 + b * 0.38) * 42) + 'px';
    });
  }

  // 60s loop cue
  if (sessionActive && !musicLooped && elapsed >= LOOP_MS) loopMusicCue();

  requestAnimationFrame(frame);
}

// ─── State: pulse ──────────────────────────────────────────────
function firePulse() {
  if (appState !== 'listening') return;
  appState = 'pulse';
  triggerCount++;
  circleEl.classList.add('amber');

  const startPx = parseFloat(circleEl.style.width) || C_MAX;
  const t0 = performance.now();

  function animatePulse(now) {
    const dt = now - t0;
    let size;
    if (dt < 190) {
      size = startPx + (C_PULSE - startPx) * (1 - Math.pow(1 - dt / 190, 3));
    } else if (dt < 430) {
      size = C_PULSE + (C_MIN - C_PULSE) * Math.pow((dt - 190) / 240, 2);
    } else {
      setSize(C_MIN);
      if (triggerCount === SILENCE_ON) toSilence();
      else toSpeaking();
      return;
    }
    setSize(size);
    requestAnimationFrame(animatePulse);
  }

  requestAnimationFrame(animatePulse);
}

// ─── State: speaking ───────────────────────────────────────────
function toSpeaking() {
  appState = 'speaking';
  setSize(C_SPEAK);
  barsEl.classList.add('show');
  duckMusic();

  const utt = new SpeechSynthesisUtterance(LINES[Math.floor(Math.random() * LINES.length)]);
  if (selectedVoice) utt.voice = selectedVoice;
  utt.rate   = 0.80;
  utt.pitch  = 0.90;
  utt.volume = 0.92;

  let done = false;
  const finish = () => { if (done) return; done = true; toListening(); };
  utt.onend = finish;
  setTimeout(finish, 5500);

  speechSynthesis.cancel();
  speechSynthesis.speak(utt);
}

// ─── State: silence (empty-string return) ──────────────────────
// Circle briefly amber — AI observed, chose not to speak
function toSilence() {
  appState = 'speaking'; // block re-triggers during hold
  // No bars, no speech, no duck — the quiet is the moment
  setTimeout(toListening, 1800);
}

// ─── State: listening ──────────────────────────────────────────
function toListening() {
  appState = 'listening';
  circleEl.classList.remove('amber');
  barsEl.classList.remove('show');
  barEls.forEach(b => { b.style.height = '6px'; });
  unduckMusic();
  lastSpeakTime = Date.now(); // start gap timer from now
}

// ─── End overlay ───────────────────────────────────────────────
function showEnd()    { endOverlay.classList.add('show'); }
function dismissEnd() { endOverlay.classList.remove('show'); }

function confirmEnd() {
  endOverlay.classList.remove('show');
  sessionActive = false;
  appState = 'ended';
  rafActive = false;

  // Fade screen to charcoal
  phone.classList.add('ended');

  // Stop audio
  speechSynthesis.cancel();
  if (masterGain && audioCtx) {
    const now = audioCtx.currentTime;
    masterGain.gain.cancelScheduledValues(now);
    masterGain.gain.setTargetAtTime(0, now, 0.35);
    setTimeout(() => { try { audioCtx.close(); } catch (_) {} audioCtx = null; masterGain = null; }, 1800);
  }

  // Stop camera
  if (cam.srcObject) {
    cam.srcObject.getTracks().forEach(t => t.stop());
    cam.srcObject = null;
  }

  // Release wake lock
  if (wakeLock) { try { wakeLock.release(); } catch (_) {} wakeLock = null; }

  // Navigate back to home after the fade settles
  setTimeout(() => { window.location.href = 'metoo.html'; }, 1500);
}

// Tap overlay background (not the button) to dismiss
endOverlay.addEventListener('click', e => { if (e.target === endOverlay) dismissEnd(); });
document.getElementById('endBtn').addEventListener('click', confirmEnd);

// Long-press 1.5s → reveal overlay
function startLongPress() { longPressTimer = setTimeout(showEnd, 1500); }
function cancelLongPress() { clearTimeout(longPressTimer); }

phone.addEventListener('mousedown',  startLongPress);
phone.addEventListener('mouseup',    cancelLongPress);
phone.addEventListener('mouseleave', cancelLongPress);
phone.addEventListener('touchstart', startLongPress, { passive: true });
phone.addEventListener('touchend',   cancelLongPress);
phone.addEventListener('touchmove',  cancelLongPress, { passive: true });

// ─── Boot ──────────────────────────────────────────────────────
let sessionStarted = false;

function startSession() {
  if (sessionStarted) return;
  sessionStarted = true;

  // Prime speech synthesis inside user gesture (required on iOS WebKit)
  const prime = new SpeechSynthesisUtterance(' ');
  prime.volume = 0;
  prime.rate   = 10;
  speechSynthesis.speak(prime);

  initAudio();

  tapHint.style.opacity = '0';
  setTimeout(() => { tapHint.style.display = 'none'; }, 800);

  sessionActive = true;
  // Allow first motion trigger after ~6s (not immediately)
  lastSpeakTime = Date.now() - (GAP_MS - 6000);
}

async function boot() {
  // Camera and voices load immediately — no gesture needed
  await Promise.all([initCamera(), loadVoices()]);
  initWakeLock();
  try { await screen.orientation.lock('portrait'); } catch (_) {}

  // Breathing starts now
  requestAnimationFrame(frame);

  // Motion detection at ~10 fps
  setInterval(detectMotion, 100);

  // Tap hint appears after a beat
  setTimeout(() => tapHint.classList.add('show'), 800);

  // Audio + session activate on first tap
  document.addEventListener('click',      startSession, { once: true });
  document.addEventListener('touchstart', startSession, { once: true, passive: true });
}

boot();
</script>
</body>
</html>
